<style>
:root{
  --blanc:#FFFFFF;--noir:#1B3A6B;--gris:#F4F6FB;--gris2:#DDE3F0;--gris3:#A8B4CC;--muted:#7A90B5;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--noir);
  color:var(--blanc);
  font-family:'Nunito',sans-serif;
  font-weight:700;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 24px;
  position:relative;
  overflow:hidden;
}

/* Cercles décoratifs — repris de l'écran auth */
.cercle{
  position:absolute;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.05);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}
.cercle:nth-child(1){width:400px;height:400px;}
.cercle:nth-child(2){width:620px;height:620px;}
.cercle:nth-child(3){width:860px;height:860px;}

.contenu{position:relative;z-index:2;max-width:480px;}

.numero{
  font-size:120px;font-weight:900;
  color:rgba(255,255,255,.06);
  line-height:1;
  letter-spacing:-6px;
  margin-bottom:-20px;
  user-select:none;
}

.rideau{
  font-size:52px;
  margin-bottom:20px;
}

.titre{
  font-size:28px;font-weight:900;
  color:var(--blanc);
  letter-spacing:-.5px;
  margin-bottom:12px;
  line-height:1.1;
}

.desc{
  font-size:15px;font-weight:600;
  color:rgba(255,255,255,.4);
  line-height:1.65;
  margin-bottom:36px;
}

.btn-retour{
  display:inline-block;
  padding:14px 32px;
  background:var(--blanc);
  color:var(--noir);
  border-radius:100px;
  font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:900;
  letter-spacing:1px;text-transform:uppercase;
  text-decoration:none;
  transition:opacity .2s, transform .2s;
}
.btn-retour:hover{opacity:.88;transform:translateY(-2px);}

.logo{
  position:absolute;
  top:28px;left:50%;
  transform:translateX(-50%);
  font-size:18px;font-weight:900;
  letter-spacing:4px;text-transform:uppercase;
  color:rgba(255,255,255,.25);
  text-decoration:none;
  z-index:2;
  transition:color .2s;
}
.logo:hover{color:rgba(255,255,255,.6);}
</style>
</head>

<div class="cercle"></div>
<div class="cercle"></div>
<div class="cercle"></div>

<a href="index.html" class="logo">Entracte</a>

  <div class="rideau">🎭</div>
  <h1 class="titre">Ce spectacle n'est pas à l'affiche</h1>
  <p class="desc">La page que vous cherchez n'existe pas ou a été déplacée. Retournez à l'accueil pour découvrir les spectacles en ce moment.</p>
  <a href="index.html" class="btn-retour">Retour à l'accueil</a>
</div>
