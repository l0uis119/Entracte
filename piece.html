<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Entracte — Spectacle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --blanc:#FFFFFF;--noir:#111111;--gris:#F7F7F7;--gris2:#EEEEEE;--gris3:#CCCCCC;
  --texte2:#666666;--muted:#AAAAAA;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--blanc);color:var(--noir);font-family:'Nunito',sans-serif;font-weight:700;min-height:100vh;}

nav{height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 36px;background:var(--blanc);border-bottom:2px solid var(--gris2);position:sticky;top:0;z-index:100;}
.nav-logo{font-size:22px;font-weight:900;color:var(--noir);letter-spacing:4px;text-transform:uppercase;text-decoration:none;}
.nav-retour{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;background:none;font-family:'Nunito',sans-serif;transition:color .2s;}
.nav-retour:hover{color:var(--noir);}
.nav-retour svg{width:16px;height:16px;}

.loader-page{display:flex;align-items:center;justify-content:center;min-height:60vh;}
.lp{width:10px;height:10px;border-radius:50%;background:var(--gris2);margin:0 4px;animation:rebond 1s infinite ease-in-out;}
.lp:nth-child(2){animation-delay:.15s;}
.lp:nth-child(3){animation-delay:.3s;}
@keyframes rebond{0%,80%,100%{transform:scale(.4);opacity:.4;}40%{transform:scale(1);opacity:1;}}

/* HERO */
.hero-piece{background:var(--noir);position:relative;overflow:hidden;}
.hero-bg-img{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.2;filter:blur(24px) saturate(.4);}
.hero-bg-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(17,17,17,.2) 0%,rgba(17,17,17,.98) 100%);}
.hero-inner{position:relative;z-index:2;display:flex;gap:40px;padding:56px 40px;align-items:flex-end;max-width:1000px;margin:0 auto;}
@media(max-width:640px){.hero-inner{flex-direction:column;padding:32px 20px;align-items:flex-start;}}

.affiche-grande{width:200px;flex-shrink:0;aspect-ratio:2/3;border-radius:16px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.6);}
@media(max-width:640px){.affiche-grande{width:130px;}}
.affiche-grande img{width:100%;height:100%;object-fit:cover;}
.affiche-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#222;}
.affiche-ph-ico{font-size:36px;opacity:.3;}
.affiche-ph-titre{font-size:13px;font-weight:800;color:rgba(255,255,255,.3);text-align:center;padding:0 12px;letter-spacing:.5px;}

.hero-infos{flex:1;min-width:0;padding-bottom:4px;}
.hero-genre{display:inline-block;padding:5px 14px;border-radius:100px;border:2px solid rgba(255,255,255,.2);font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:16px;}
.hero-titre{font-size:44px;font-weight:900;color:var(--blanc);line-height:.95;margin-bottom:10px;letter-spacing:-1px;}
@media(max-width:640px){.hero-titre{font-size:30px;}}
.hero-auteur{font-size:16px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:20px;}
.hero-note{display:flex;align-items:center;gap:8px;margin-bottom:24px;}
.etoiles{display:flex;gap:2px;}
.etoile{font-size:18px;}
.note-chiffre{font-size:15px;font-weight:900;color:#FFD700;}
.note-count{font-size:13px;font-weight:700;color:rgba(255,255,255,.3);}

.hero-actions{display:flex;gap:10px;flex-wrap:wrap;}
.btn-reserver{padding:13px 26px;background:var(--blanc);color:var(--noir);border-radius:100px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;letter-spacing:1px;text-transform:uppercase;text-decoration:none;transition:all .2s;border:none;cursor:pointer;}
.btn-reserver:hover{opacity:.85;transform:translateY(-1px);}
.btn-journal{padding:13px 20px;border-radius:100px;border:2px solid rgba(255,255,255,.25);background:transparent;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.7);cursor:pointer;transition:all .2s;}
.btn-journal:hover{border-color:rgba(255,255,255,.6);color:var(--blanc);}
.btn-journal.vu{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.5);color:var(--blanc);}

/* BODY */
.piece-body{max-width:1000px;margin:0 auto;padding:0 40px 80px;}
@media(max-width:640px){.piece-body{padding:0 20px 80px;}}

.info-band{display:flex;gap:0;border-bottom:2px solid var(--gris2);margin-bottom:40px;}
.info-bloc{flex:1;padding:24px 20px;border-right:1px solid var(--gris2);}
.info-bloc:last-child{border-right:none;}
.info-label{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.info-val{font-size:16px;font-weight:900;color:var(--noir);line-height:1.3;letter-spacing:-.3px;}
.info-val-sm{font-size:14px;}
@media(max-width:600px){.info-band{flex-direction:column;}.info-bloc{border-right:none;border-bottom:1px solid var(--gris2);padding:16px 0;}}

.section{margin-bottom:48px;}
.section-titre{font-size:22px;font-weight:900;color:var(--noir);margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--gris2);letter-spacing:-.5px;}
.description{font-size:16px;font-weight:600;color:var(--texte2);line-height:1.75;}

/* AVIS FORM */
.avis-form{background:var(--gris);border-radius:16px;padding:24px;}
.avis-form-label{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.etoiles-form{display:flex;gap:6px;margin-bottom:16px;}
.etoile-btn{font-size:32px;cursor:pointer;transition:transform .15s;color:var(--gris2);line-height:1;}
.etoile-btn:hover{transform:scale(1.2);}
.etoile-btn.actif{color:#FFD700;}

/* Textarea + compteur */
.textarea-wrap{position:relative;margin-bottom:14px;}
textarea.avis-inp{
  width:100%;padding:14px 16px 40px;
  border:2px solid var(--gris2);border-radius:12px;
  background:var(--blanc);
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--noir);
  outline:none;resize:vertical;min-height:110px;
  transition:border-color .2s;
}
textarea.avis-inp:focus{border-color:var(--noir);}
textarea.avis-inp.invalide{border-color:#E53E3E;}
textarea.avis-inp.valide{border-color:#38A169;}

.compteur{
  position:absolute;bottom:12px;right:14px;
  font-size:11px;font-weight:800;letter-spacing:.5px;
  color:var(--muted);transition:color .2s;pointer-events:none;
}
.compteur.ok{color:#38A169;}
.compteur.presque{color:#D97706;}
.compteur.loin{color:var(--muted);}

/* Barre de progression */
.barre-wrap{height:3px;background:var(--gris2);border-radius:100px;margin-bottom:14px;overflow:hidden;}
.barre-progress{
  height:100%;border-radius:100px;
  background:var(--gris3);
  transition:width .2s ease, background .2s;
  width:0%;
}
.barre-progress.ok{background:#38A169;}
.barre-progress.presque{background:#D97706;}

.indice-min{
  font-size:12px;font-weight:700;color:var(--muted);
  margin-bottom:14px;line-height:1.5;
}

.btn-publier{
  padding:12px 24px;background:var(--noir);color:var(--blanc);
  border:none;border-radius:100px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;
  letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;
}
.btn-publier:hover{opacity:.8;}
.btn-publier:disabled{opacity:.35;cursor:not-allowed;}

/* AVIS LISTE */
.avis-card{padding:20px 0;border-bottom:1px solid var(--gris2);}
.avis-card:last-child{border-bottom:none;}
.avis-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.avis-pseudo{font-size:15px;font-weight:900;color:var(--noir);}
.avis-etoiles{display:flex;gap:1px;}
.avis-etoile{font-size:14px;}
.avis-date{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted);margin-left:auto;}
.avis-texte{font-size:15px;font-weight:600;color:var(--texte2);line-height:1.6;white-space:pre-wrap;}
.avis-vide{font-size:15px;font-weight:700;color:var(--muted);text-align:center;padding:40px 0;}

.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--noir);color:var(--blanc);padding:12px 24px;border-radius:100px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap;}
.toast.ok{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Entracte</a>
  <button class="nav-retour" onclick="history.back()">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Retour
  </button>
</nav>

<div id="contenu">
  <div class="loader-page"><div class="lp"></div><div class="lp"></div><div class="lp"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://dgnmqlwjfedhndftqdlp.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnbm1xbHdqZmVkaG5kZnRxZGxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTUwNDcsImV4cCI6MjA4OTA5MTA0N30.w_D2a89bmgJu6hBtIG7Y62sAULyuEsx7gBcmGfLGzKE';
const supa=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let user=null,noteSelectionnee=0,pieceId=null;
const MIN_CHARS=150;

// ─── SÉCURITÉ ANTI-XSS ───────────────────────────────────────────────────────
// Convertit les caractères HTML spéciaux en entités inoffensives.
// Ainsi "<script>" devient "&lt;script&gt;" et s'affiche comme du texte pur,
// sans jamais être exécuté par le navigateur.
function echapper(str){
  if(!str)return'';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('ok');setTimeout(()=>t.classList.remove('ok'),2600);}
function etoilesHTML(n,taille='15px'){return[1,2,3,4,5].map(i=>`<span class="avis-etoile" style="font-size:${taille};color:${i<=Math.round(n)?'#FFD700':'var(--gris2)'}">★</span>`).join('');}
function setNote(n){noteSelectionnee=n;document.querySelectorAll('.etoile-btn').forEach((el,i)=>el.classList.toggle('actif',i<n));}

// ─── COMPTEUR EN TEMPS RÉEL ───────────────────────────────────────────────────
// Mis à jour à chaque frappe : colore la barre de progression et le compteur
// pour guider l'utilisateur vers les 150 caractères requis.
function mettreAJourCompteur(){
  const ta=document.getElementById('avis-texte');
  const cpt=document.getElementById('compteur');
  const barre=document.getElementById('barre-progress');
  const btn=document.getElementById('btn-publier');
  if(!ta||!cpt||!barre)return;

  const n=ta.value.trim().length;
  const pct=Math.min(100,Math.round(n/MIN_CHARS*100));

  // Texte du compteur
  if(n>=MIN_CHARS){
    cpt.textContent=`${n} car.`;
    cpt.className='compteur ok';
  } else {
    cpt.textContent=`${n}/${MIN_CHARS}`;
    cpt.className=n>=MIN_CHARS*.6?'compteur presque':'compteur loin';
  }

  // Barre de progression
  barre.style.width=pct+'%';
  barre.className=n>=MIN_CHARS?'barre-progress ok':n>=MIN_CHARS*.6?'barre-progress presque':'barre-progress';

  // Bordure textarea
  ta.className=n===0?'avis-inp':n>=MIN_CHARS?'avis-inp valide':'avis-inp invalide';

  // Bouton désactivé si insuffisant
  btn.disabled=n<MIN_CHARS;
}

async function toggleJournal(){
  if(!user){toast('Connectez-vous pour utiliser le journal.');return;}
  const btn=document.getElementById('btn-journal');
  const{data:ex}=await supa.from('journal').select('id').eq('user_id',user.id).eq('piece_id',pieceId).maybeSingle();
  if(ex){
    await supa.from('journal').delete().eq('id',ex.id);
    btn.textContent='+ Marquer comme vu';btn.classList.remove('vu');toast('Retiré du journal.');
  } else {
    await supa.from('journal').insert({user_id:user.id,piece_id:pieceId,date_vue:new Date().toISOString().slice(0,10)});
    btn.textContent='✓ Vu';btn.classList.add('vu');toast('🎭 Ajouté à votre journal !');
  }
}

async function publierAvis(){
  if(!user){toast('Connectez-vous pour publier un avis.');return;}
  if(!noteSelectionnee){toast('Choisissez une note.');return;}
  const commentaire=document.getElementById('avis-texte').value.trim();
  // Double vérification côté JS (la première est le bouton désactivé)
  if(commentaire.length<MIN_CHARS){toast(`Encore ${MIN_CHARS-commentaire.length} caractères pour un avis solide !`);return;}
  const{data:ex}=await supa.from('avis').select('id').eq('user_id',user.id).eq('piece_id',pieceId).maybeSingle();
  if(ex){
    await supa.from('avis').update({note:noteSelectionnee,commentaire}).eq('id',ex.id);
    toast('✓ Avis modifié !');
  } else {
    await supa.from('avis').insert({user_id:user.id,piece_id:pieceId,note:noteSelectionnee,commentaire});
    toast('✓ Avis publié !');
  }
  charger();
}

async function charger(){
  const params=new URLSearchParams(window.location.search);
  pieceId=params.get('id');
  if(!pieceId){document.getElementById('contenu').innerHTML='<div style="padding:60px;text-align:center;color:var(--muted)">Pièce introuvable.</div>';return;}

  const{data:p}=await supa.from('pieces').select(`id,titre,auteur,metteur_scene,genre,description,affiche_url,duree_min,representations(date_debut,date_fin,prix_min,lien_reservation,theatres(nom,ville,adresse))`).eq('id',pieceId).single();
  if(!p){document.getElementById('contenu').innerHTML='<div style="padding:60px;text-align:center">Pièce introuvable.</div>';return;}

  // On échappe le titre pour l'utiliser dans le <title> HTML sans risque
  document.title=`Entracte — ${echapper(p.titre)}`;

  const{data:avisData}=await supa.from('avis').select(`note,commentaire,created_at,profils(pseudo)`).eq('piece_id',pieceId).order('created_at',{ascending:false}).limit(30);
  let dejaVu=false,monAvis=null;
  if(user){
    const{data:j}=await supa.from('journal').select('id').eq('user_id',user.id).eq('piece_id',pieceId).maybeSingle();
    dejaVu=!!j;
    const{data:a}=await supa.from('avis').select('id,note,commentaire').eq('user_id',user.id).eq('piece_id',pieceId).maybeSingle();
    monAvis=a;if(monAvis)noteSelectionnee=monAvis.note;
  }

  const rep=p.representations?.[0],th=rep?.theatres;
  const moy=avisData?.length?(avisData.reduce((s,a)=>s+a.note,0)/avisData.length).toFixed(1):null;
  const nbAvis=avisData?.length||0;
  const fmt=d=>d?new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}):null;

  // ── Données de la pièce : on passe tout par echapper() avant innerHTML ──
  // Cela neutralise tout HTML malveillant éventuellement stocké en base
  const titreSafe=echapper(p.titre);
  const auteurSafe=echapper(p.auteur);
  const genreSafe=echapper(p.genre);
  const descSafe=echapper(p.description);
  const nomThSafe=echapper(th?.nom);
  const villeThSafe=echapper(th?.ville);

  document.getElementById('contenu').innerHTML=`
    <div class="hero-piece">
      <div class="hero-bg-img" style="${p.affiche_url?`background-image:url('${echapper(p.affiche_url)}')`:''}" ></div>
      <div class="hero-bg-grad"></div>
      <div class="hero-inner">
        <div class="affiche-grande">
          ${p.affiche_url
            ?`<img src="${echapper(p.affiche_url)}" alt="${titreSafe}">`
            :`<div class="affiche-ph"><div class="affiche-ph-ico">🎭</div><div class="affiche-ph-titre">${titreSafe}</div></div>`}
        </div>
        <div class="hero-infos">
          ${genreSafe?`<div class="hero-genre">${genreSafe}</div>`:''}
          <h1 class="hero-titre">${titreSafe}</h1>
          ${auteurSafe?`<div class="hero-auteur">— ${auteurSafe}</div>`:''}
          ${moy?`<div class="hero-note"><div class="etoiles">${etoilesHTML(moy,'20px')}</div><span class="note-chiffre">${moy}/5</span><span class="note-count">(${nbAvis} avis)</span></div>`:''}
          <div class="hero-actions">
            ${rep?.lien_reservation?`<a class="btn-reserver" href="${echapper(rep.lien_reservation)}" target="_blank" rel="noopener noreferrer">Réserver →</a>`:''}
            <button class="btn-journal ${dejaVu?'vu':''}" id="btn-journal" onclick="toggleJournal()">${dejaVu?'✓ Vu':'+ Marquer comme vu'}</button>
          </div>
        </div>
      </div>
    </div>

    <div class="piece-body">
      <div class="info-band">
        ${nomThSafe?`<div class="info-bloc"><div class="info-label">Théâtre</div><div class="info-val">${nomThSafe}</div>${villeThSafe?`<div class="info-val info-val-sm" style="color:var(--muted);font-weight:700">${villeThSafe}</div>`:''}</div>`:''}
        ${rep?.date_debut?`<div class="info-bloc"><div class="info-label">Dates</div><div class="info-val info-val-sm">${fmt(rep.date_debut)}${rep.date_fin?' → '+fmt(rep.date_fin):''}</div></div>`:''}
        ${rep?.prix_min?`<div class="info-bloc"><div class="info-label">Tarif</div><div class="info-val">À partir de ${echapper(String(rep.prix_min))}€</div></div>`:''}
        ${p.duree_min?`<div class="info-bloc"><div class="info-label">Durée</div><div class="info-val">${echapper(String(p.duree_min))} min</div></div>`:''}
      </div>

      ${descSafe?`<div class="section"><div class="section-titre">À propos</div><div class="description">${descSafe}</div></div>`:''}

      <div class="section">
        <div class="section-titre">Mon avis</div>
        <div class="avis-form">
          <div class="avis-form-label">Ma note</div>
          <div class="etoiles-form">${[1,2,3,4,5].map(i=>`<span class="etoile-btn ${monAvis&&i<=monAvis.note?'actif':''}" onclick="setNote(${i})">★</span>`).join('')}</div>

          <div class="textarea-wrap">
            <textarea class="avis-inp" id="avis-texte" placeholder="Partagez votre ressenti… Décrivez l'ambiance, le jeu des acteurs, la mise en scène, ce qui vous a touché ou surpris." rows="4" oninput="mettreAJourCompteur()" maxlength="2000">${monAvis?.commentaire||''}</textarea>
            <span class="compteur loin" id="compteur">0/${MIN_CHARS}</span>
          </div>

          <div class="barre-wrap"><div class="barre-progress" id="barre-progress"></div></div>

          <div class="indice-min">Un avis doit faire au moins <strong>${MIN_CHARS} caractères</strong>. Décrivez ce qui vous a marqué, le jeu des comédiens, la mise en scène.</div>

          <button class="btn-publier" id="btn-publier" onclick="publierAvis()" disabled>${monAvis?'Modifier mon avis':'Publier mon avis'}</button>
        </div>
      </div>

      <div class="section">
        <div class="section-titre">Avis du public ${nbAvis?`<span style="font-size:15px;color:var(--muted);font-weight:700">(${nbAvis})</span>`:''}</div>
        ${nbAvis?avisData.map(a=>{
          // ── CORRECTION XSS ── : on n'utilise plus innerHTML directement avec
          // des données issues de la base. echapper() transforme tout code HTML
          // en texte inoffensif affiché tel quel.
          const pseudoSafe=echapper(a.profils?.pseudo||'Anonyme');
          const commentaireSafe=echapper(a.commentaire);
          return`<div class="avis-card">
            <div class="avis-top">
              <div class="avis-pseudo">${pseudoSafe}</div>
              <div class="avis-etoiles">${etoilesHTML(a.note)}</div>
              <div class="avis-date">${new Date(a.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}</div>
            </div>
            ${commentaireSafe?`<div class="avis-texte">${commentaireSafe}</div>`:''}
          </div>`;
        }).join(''):`<div class="avis-vide">Soyez le premier à donner votre avis !</div>`}
      </div>
    </div>`;

  // Toujours appeler le compteur après le rendu :
  // - si avis existant : active le bouton si le texte fait déjà 150+ car.
  // - si pas d'avis : initialise la barre à 0% et garde le bouton désactivé
  mettreAJourCompteur();
}

window.addEventListener('DOMContentLoaded',async()=>{
  const{data:{session}}=await supa.auth.getSession();
  if(session?.user)user=session.user;
  charger();
});
</script>
</body>
</html>
