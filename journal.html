<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Entracte — Mon Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,500;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --creme:#F5F0E8;--creme2:#EDE6D6;--creme3:#E2D9C5;
  --rouge:#B8311F;--rouge2:#D94030;--or:#C9912A;
  --noir:#1C1410;--brun:#5C4033;--brun2:#7A5C48;--muted:#9C8070;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--creme);color:var(--noir);font-family:'Lora',serif;min-height:100vh;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"),linear-gradient(160deg,#F7F2EA 0%,#EFE8D7 100%);}

nav{height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:var(--noir);position:sticky;top:0;z-index:100;border-bottom:2px solid var(--rouge);}
.nav-logo{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;font-style:italic;color:var(--creme);letter-spacing:-.5px;text-decoration:none;}
.nav-logo em{font-style:normal;color:var(--rouge2);}
.nav-lien{font-family:'Libre Baskerville',serif;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:rgba(245,240,232,.45);cursor:pointer;transition:color .2s;padding:6px 0;border:none;background:none;text-decoration:none;}
.nav-lien:hover{color:var(--creme);}

.loader-page{display:flex;align-items:center;justify-content:center;min-height:60vh;}
.lp{width:8px;height:8px;border-radius:50%;background:var(--rouge);margin:0 4px;animation:rebond 1s infinite ease-in-out;}
.lp:nth-child(2){animation-delay:.15s;background:var(--or);}
.lp:nth-child(3){animation-delay:.3s;}
@keyframes rebond{0%,80%,100%{transform:scale(.5);opacity:.3;}40%{transform:scale(1.1);opacity:1;}}

/* NON CONNECTE */
.non-connecte{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:40px;}
.non-connecte-ico{font-size:48px;margin-bottom:20px;opacity:.4;}
.non-connecte-titre{font-family:'Playfair Display',serif;font-size:28px;font-style:italic;color:var(--noir);margin-bottom:10px;}
.non-connecte-desc{font-size:14px;font-style:italic;color:var(--muted);margin-bottom:24px;}
.btn-connexion{padding:13px 28px;background:var(--rouge);color:var(--creme);border-radius:8px;font-family:'Libre Baskerville',serif;font-size:13px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;text-decoration:none;transition:all .2s;}
.btn-connexion:hover{background:var(--rouge2);}

/* HEADER JOURNAL */
.journal-header{padding:48px 40px 32px;max-width:1000px;margin:0 auto;}
@media(max-width:640px){.journal-header{padding:32px 20px 24px;}}
.journal-eyebrow{font-family:'Libre Baskerville',serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--rouge);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.journal-eyebrow::before{content:'';display:block;width:24px;height:1.5px;background:var(--rouge);}
.journal-titre{font-family:'Playfair Display',serif;font-size:44px;font-weight:900;font-style:italic;color:var(--noir);line-height:1.1;margin-bottom:8px;}
.journal-pseudo{font-family:'Lora',serif;font-size:15px;font-style:italic;color:var(--muted);}

/* STATS */
.stats-band{display:flex;gap:0;background:#FFFDF8;border:1px solid var(--creme3);border-radius:12px;margin:0 40px 40px;max-width:920px;margin-left:auto;margin-right:auto;overflow:hidden;}
@media(max-width:640px){.stats-band{margin:0 20px 32px;flex-wrap:wrap;}}
.stat{flex:1;padding:24px 20px;text-align:center;border-right:1px solid var(--creme3);}
.stat:last-child{border-right:none;}
@media(max-width:640px){.stat{flex:1 1 50%;border-bottom:1px solid var(--creme3);}}
.stat-n{font-family:'Playfair Display',serif;font-size:40px;font-weight:900;font-style:italic;color:var(--rouge);line-height:1;}
.stat-lbl{font-family:'Libre Baskerville',serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:6px;}

/* LISTE JOURNAL */
.journal-body{max-width:1000px;margin:0 auto;padding:0 40px 80px;}
@media(max-width:640px){.journal-body{padding:0 20px 80px;}}

.journal-section-titre{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;font-style:italic;color:var(--noir);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--creme3);}

.journal-liste{display:flex;flex-direction:column;gap:16px;margin-bottom:48px;}

.journal-carte{display:flex;gap:20px;background:#FFFDF8;border-radius:12px;border:1px solid var(--creme3);padding:16px;cursor:pointer;transition:all .25s;text-decoration:none;color:inherit;}
.journal-carte:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(28,20,16,.1);border-color:transparent;}
.jc-affiche{width:70px;flex-shrink:0;aspect-ratio:2/3;border-radius:8px;overflow:hidden;background:var(--creme2);}
.jc-affiche img{width:100%;height:100%;object-fit:cover;}
.jc-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;opacity:.3;}
.jc-infos{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;}
.jc-titre{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;font-style:italic;color:var(--noir);margin-bottom:4px;line-height:1.2;}
.jc-auteur{font-family:'Lora',serif;font-size:13px;font-style:italic;color:var(--brun);margin-bottom:8px;}
.jc-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.jc-theatre{font-family:'Libre Baskerville',serif;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.jc-date-vue{font-family:'Libre Baskerville',serif;font-size:11px;color:var(--muted);}
.jc-note{display:flex;gap:1px;}
.jc-etoile{font-size:13px;}
.jc-retirer{margin-left:auto;padding:6px 12px;border-radius:6px;border:1px solid var(--creme3);background:transparent;font-family:'Libre Baskerville',serif;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .2s;flex-shrink:0;}
.jc-retirer:hover{border-color:var(--rouge);color:var(--rouge);}

/* VIDE */
.journal-vide{text-align:center;padding:60px 20px;}
.journal-vide-ico{font-size:44px;opacity:.25;margin-bottom:16px;}
.journal-vide-titre{font-family:'Playfair Display',serif;font-size:24px;font-style:italic;color:var(--brun);margin-bottom:8px;}
.journal-vide-desc{font-size:13px;font-style:italic;color:var(--muted);margin-bottom:24px;}
.btn-explorer{padding:11px 22px;background:var(--rouge);color:var(--creme);border-radius:8px;font-family:'Libre Baskerville',serif;font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;text-decoration:none;transition:all .2s;}
.btn-explorer:hover{background:var(--rouge2);}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--noir);color:var(--creme);padding:11px 22px;border-radius:100px;font-family:'Libre Baskerville',serif;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap;border:1px solid rgba(245,240,232,.15);}
.toast.ok{opacity:1;transform:translateX(-50%) translateY(0);}

/* NAV BAS mobile */
.nav-bas{display:none;position:fixed;bottom:0;left:0;right:0;height:58px;background:var(--noir);border-top:2px solid var(--rouge);z-index:100;}
@media(max-width:640px){.nav-bas{display:flex;}body{padding-bottom:58px;}}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-family:'Libre Baskerville',serif;font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:rgba(245,240,232,.35);cursor:pointer;transition:color .2s;text-decoration:none;}
.nb.actif{color:var(--rouge2);}
.nb svg{width:19px;height:19px;}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">entr<em>acte</em></a>
  <a href="index.html" class="nav-lien">← Accueil</a>
</nav>

<div id="contenu">
  <div class="loader-page">
    <div class="lp"></div><div class="lp"></div><div class="lp"></div>
  </div>
</div>

<div class="nav-bas">
  <a href="index.html" class="nb"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Accueil</a>
  <a href="journal.html" class="nb actif"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Journal</a>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://dgnmqlwjfedhndftqdlp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnbm1xbHdqZmVkaG5kZnRxZGxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTUwNDcsImV4cCI6MjA4OTA5MTA0N30.w_D2a89bmgJu6hBtIG7Y62sAULyuEsx7gBcmGfLGzKE';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('ok');setTimeout(()=>t.classList.remove('ok'),2600);}

function etoilesHTML(n){
  return [1,2,3,4,5].map(i=>`<span class="jc-etoile" style="color:${i<=Math.round(n)?'var(--or)':'var(--creme3)'}">★</span>`).join('');
}

async function retirerDuJournal(journalId, e){
  e.preventDefault(); e.stopPropagation();
  await supa.from('journal').delete().eq('id', journalId);
  toast('Retiré du journal.');
  charger();
}

async function charger(){
  const {data:{session}} = await supa.auth.getSession();

  if(!session?.user){
    document.getElementById('contenu').innerHTML = `
      <div class="non-connecte">
        <div class="non-connecte-ico">📖</div>
        <div class="non-connecte-titre">Votre journal vous attend</div>
        <p class="non-connecte-desc">Connectez-vous pour retrouver toutes les pièces que vous avez vues.</p>
        <a href="index.html" class="btn-connexion">Se connecter</a>
      </div>`;
    return;
  }

  const user = session.user;

  // Récupérer le profil
  const {data:profil} = await supa.from('profils').select('pseudo').eq('id',user.id).single();
  const pseudo = profil?.pseudo || user.email.split('@')[0];

  // Récupérer le journal avec les pièces et avis
  const {data:journal} = await supa.from('journal').select(`
    id, date_vue, note_perso,
    pieces(id,titre,auteur,genre,affiche_url,
      representations(theatres(nom,ville)))
  `).eq('user_id', user.id).order('created_at', {ascending:false});

  // Récupérer mes avis pour les notes
  const {data:mesAvis} = await supa.from('avis').select('piece_id,note').eq('user_id',user.id);
  const avisMap = {};
  (mesAvis||[]).forEach(a => avisMap[a.piece_id] = a.note);

  const nbPieces = journal?.length || 0;
  const genres = [...new Set((journal||[]).map(j=>j.pieces?.genre).filter(Boolean))];
  const theatres = [...new Set((journal||[]).map(j=>j.pieces?.representations?.[0]?.theatres?.nom).filter(Boolean))];
  const notesMoyenne = mesAvis?.length ? (mesAvis.reduce((s,a)=>s+a.note,0)/mesAvis.length).toFixed(1) : '—';

  // Grouper par année/mois
  const groupes = {};
  (journal||[]).forEach(j => {
    const date = j.date_vue ? new Date(j.date_vue) : new Date(j.created_at||Date.now());
    const cle = `${date.getFullYear()}`;
    if(!groupes[cle]) groupes[cle] = [];
    groupes[cle].push(j);
  });

  document.getElementById('contenu').innerHTML = `
    <div class="journal-header">
      <div class="journal-eyebrow">Mon journal</div>
      <h1 class="journal-titre">Les spectacles<br>de <em>${pseudo}</em></h1>
      ${nbPieces ? `<p class="journal-pseudo">${nbPieces} soirée${nbPieces>1?'s':''} mémorisée${nbPieces>1?'s':''}</p>` : ''}
    </div>

    <div class="stats-band">
      <div class="stat"><div class="stat-n">${nbPieces}</div><div class="stat-lbl">Spectacles vus</div></div>
      <div class="stat"><div class="stat-n">${theatres.length}</div><div class="stat-lbl">Théâtres visités</div></div>
      <div class="stat"><div class="stat-n">${genres.length}</div><div class="stat-lbl">Genres explorés</div></div>
      <div class="stat"><div class="stat-n">${notesMoyenne}</div><div class="stat-lbl">Note moyenne</div></div>
    </div>

    <div class="journal-body">
      ${nbPieces === 0 ? `
        <div class="journal-vide">
          <div class="journal-vide-ico">🎭</div>
          <div class="journal-vide-titre">Votre journal est vide</div>
          <p class="journal-vide-desc">Marquez les spectacles que vous avez vus pour les retrouver ici.</p>
          <a href="index.html" class="btn-explorer">Explorer les spectacles</a>
        </div>
      ` : Object.entries(groupes).sort((a,b)=>b[0]-a[0]).map(([annee, items]) => `
        <div class="journal-section-titre">${annee} — ${items.length} spectacle${items.length>1?'s':''}</div>
        <div class="journal-liste">
          ${items.map(j => {
            const p = j.pieces;
            const th = p?.representations?.[0]?.theatres;
            const note = avisMap[p?.id];
            const dateVue = j.date_vue ? new Date(j.date_vue).toLocaleDateString('fr-FR',{day:'numeric',month:'long'}) : null;
            return `
            <a href="piece.html?id=${p?.id}" class="journal-carte">
              <div class="jc-affiche">
                ${p?.affiche_url ? `<img src="${p.affiche_url}" alt="${p.titre}" loading="lazy">` : '<div class="jc-ph">🎭</div>'}
              </div>
              <div class="jc-infos">
                <div class="jc-titre">${p?.titre||'—'}</div>
                ${p?.auteur?`<div class="jc-auteur">${p.auteur}</div>`:''}
                <div class="jc-meta">
                  ${th?`<div class="jc-theatre"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${th.nom}</div>`:''}
                  ${dateVue?`<div class="jc-date-vue">Vu le ${dateVue}</div>`:''}
                  ${note?`<div class="jc-note">${etoilesHTML(note)}</div>`:''}
                </div>
              </div>
              <button class="jc-retirer" onclick="retirerDuJournal('${j.id}', event)">Retirer</button>
            </a>`;
          }).join('')}
        </div>
      `).join('')}
    </div>
  `;
}

window.addEventListener('DOMContentLoaded', charger);
</script>
</body>
</html>
