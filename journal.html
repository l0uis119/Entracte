<title>Entracte - Mon Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--blanc:#FFFFFF;--noir:#1B3A6B;--gris:#F4F6FB;--gris2:#DDE3F0;--gris3:#A8B4CC;--texte2:#3D5080;--muted:#7A90B5;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--blanc);color:var(--noir);font-family:'Nunito',sans-serif;font-weight:700;min-height:100vh;}

nav{height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 36px;background:var(--blanc);border-bottom:2px solid var(--gris2);position:sticky;top:0;z-index:100;}
.nav-logo{font-size:22px;font-weight:900;color:var(--noir);letter-spacing:4px;text-transform:uppercase;text-decoration:none;}
.nav-lien{font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);transition:color .2s;text-decoration:none;}
.nav-lien:hover{color:var(--noir);}

.loader-page{display:flex;align-items:center;justify-content:center;min-height:60vh;}
.lp{width:10px;height:10px;border-radius:50%;background:var(--gris2);margin:0 4px;animation:rebond 1s infinite ease-in-out;}
.lp:nth-child(2){animation-delay:.15s;}
.lp:nth-child(3){animation-delay:.3s;}
@keyframes rebond{0%,80%,100%{transform:scale(.4);opacity:.4;}40%{transform:scale(1);opacity:1;}}

/* NON CONNECTE */
.non-co{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:40px;}
.non-co-ico{font-size:52px;margin-bottom:20px;opacity:.2;}
.non-co-titre{font-size:32px;font-weight:900;color:var(--noir);margin-bottom:10px;letter-spacing:-1px;}
.non-co-desc{font-size:15px;font-weight:700;color:var(--muted);margin-bottom:28px;}
.btn-co{padding:14px 30px;background:var(--noir);color:var(--blanc);border-radius:100px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;letter-spacing:1px;text-transform:uppercase;text-decoration:none;transition:opacity .2s;}
.btn-co:hover{opacity:.8;}

/* HEADER */
.journal-header{padding:60px 40px 36px;max-width:1000px;margin:0 auto;text-align:center;}
@media(max-width:640px){.journal-header{padding:40px 20px 28px;}}
.journal-eye{font-size:11px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.journal-titre{font-size:56px;font-weight:900;color:var(--noir);line-height:.95;margin-bottom:10px;letter-spacing:-2px;}
@media(max-width:640px){.journal-titre{font-size:38px;letter-spacing:-1px;}}
.journal-sous{font-size:15px;font-weight:700;color:var(--muted);letter-spacing:.5px;}

/* STATS */
.stats{display:flex;gap:0;border:2px solid var(--gris2);border-radius:20px;margin:0 40px 48px;max-width:920px;margin-left:auto;margin-right:auto;overflow:hidden;}
@media(max-width:640px){.stats{margin:0 20px 36px;flex-wrap:wrap;border-radius:16px;}}
.stat{flex:1;padding:28px 20px;text-align:center;border-right:1px solid var(--gris2);}
.stat:last-child{border-right:none;}
@media(max-width:640px){.stat{flex:1 1 50%;border-bottom:1px solid var(--gris2);}}
.stat-n{font-size:44px;font-weight:900;color:var(--noir);line-height:1;letter-spacing:-2px;}
.stat-lbl{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:6px;}

/* BODY */
.journal-body{max-width:1000px;margin:0 auto;padding:0 40px 80px;}
@media(max-width:640px){.journal-body{padding:0 20px 80px;}}

.groupe-titre{font-size:20px;font-weight:900;color:var(--noir);margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--gris2);letter-spacing:-.5px;}

.liste{display:flex;flex-direction:column;gap:12px;margin-bottom:48px;}

.jcarte{display:flex;gap:18px;background:var(--blanc);border-radius:16px;border:2px solid var(--gris2);padding:16px;cursor:pointer;transition:all .25s;text-decoration:none;color:inherit;}
.jcarte:hover{border-color:var(--noir);transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,0,0,.08);}
.jc-aff{width:72px;flex-shrink:0;aspect-ratio:2/3;border-radius:10px;overflow:hidden;background:var(--gris);}
.jc-aff img{width:100%;height:100%;object-fit:cover;}
.jc-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;opacity:.2;}
.jc-infos{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;}
.jc-titre{font-size:18px;font-weight:900;color:var(--noir);line-height:1.1;margin-bottom:4px;letter-spacing:-.3px;}
.jc-auteur{font-size:13px;font-weight:600;color:var(--texte2);margin-bottom:10px;}
.jc-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.jc-th{font-size:11px;font-weight:800;color:var(--muted);display:flex;align-items:center;gap:4px;letter-spacing:.3px;}
.jc-date{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.3px;}
.jc-note{display:flex;gap:1px;}
.jc-etoile{font-size:13px;}
.jc-btn{margin-left:auto;padding:7px 14px;border-radius:100px;border:2px solid var(--gris2);background:transparent;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .2s;flex-shrink:0;}
.jc-btn:hover{border-color:var(--noir);color:var(--noir);}

/* VIDE */
.vide{text-align:center;padding:80px 20px;}
.vide-ico{font-size:52px;margin-bottom:20px;opacity:.15;}
.vide-titre{font-size:28px;font-weight:900;color:var(--gris3);margin-bottom:10px;letter-spacing:-1px;}
.vide-desc{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:28px;}
.btn-exp{padding:13px 26px;background:var(--noir);color:var(--blanc);border-radius:100px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;letter-spacing:1px;text-transform:uppercase;text-decoration:none;transition:opacity .2s;}
.btn-exp:hover{opacity:.8;}

.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--noir);color:var(--blanc);padding:12px 24px;border-radius:100px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap;}
.toast.ok{opacity:1;transform:translateX(-50%) translateY(0);}

.nav-bas{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--blanc);border-top:2px solid var(--gris2);z-index:100;}
@media(max-width:640px){.nav-bas{display:flex;}body{padding-bottom:60px;}}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--gris3);cursor:pointer;transition:color .2s;text-decoration:none;}
.nb.actif{color:var(--noir);}
.nb svg{width:20px;height:20px;}
</style>
</head>

<script>
const SUPABASE_URL='https://dgnmqlwjfedhndftqdlp.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnbm1xbHdqZmVkaG5kZnRxZGxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTUwNDcsImV4cCI6MjA4OTA5MTA0N30.w_D2a89bmgJu6hBtIG7Y62sAULyuEsx7gBcmGfLGzKE';
const supa=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('ok');setTimeout(()=>t.classList.remove('ok'),2600);}
function etoilesHTML(n){return[1,2,3,4,5].map(i=>`<span class="jc-etoile" style="color:${i<=Math.round(n)?'#FFD700':'var(--gris2)'}">★</span>`).join('');}

async function retirer(jid,e){
  e.preventDefault();e.stopPropagation();
  await supa.from('journal').delete().eq('id',jid);
  toast('Retiré du journal.');charger();
}

async function charger(){
  const{data:{session}}=await supa.auth.getSession();
  if(!session?.user){
    document.getElementById('contenu').innerHTML=`<div class="non-co"><div class="non-co-titre">Votre journal vous attend</div><p class="non-co-desc">Connectez-vous pour retrouver vos spectacles.</p><a href="index.html" class="btn-co">Se connecter</a></div>`;
    return;
  }
  const u=session.user;
  const{data:profil}=await supa.from('profils').select('pseudo').eq('id',u.id).single();
  const pseudo=profil?.pseudo||u.email.split('@')[0];

  const{data:journal}=await supa.from('journal').select(`id,date_vue,pieces(id,titre,auteur,genre,affiche_url,representations(theatres(nom,ville)))`).eq('user_id',u.id).order('created_at',{ascending:false});
  const{data:mesAvis}=await supa.from('avis').select('piece_id,note').eq('user_id',u.id);
  const avisMap={};(mesAvis||[]).forEach(a=>avisMap[a.piece_id]=a.note);

  const nb=journal?.length||0;
  const genres=[...new Set((journal||[]).map(j=>j.pieces?.genre).filter(Boolean))];
  const theatres=[...new Set((journal||[]).map(j=>j.pieces?.representations?.[0]?.theatres?.nom).filter(Boolean))];
  const noteMoy=mesAvis?.length?(mesAvis.reduce((s,a)=>s+a.note,0)/mesAvis.length).toFixed(1):'—';

  const groupes={};
  (journal||[]).forEach(j=>{
    const d=j.date_vue?new Date(j.date_vue):new Date();
    const cle=`${d.getFullYear()}`;
    if(!groupes[cle])groupes[cle]=[];
    groupes[cle].push(j);
  });

  document.getElementById('contenu').innerHTML=`
    <div class="journal-header">
      <div class="journal-eye">Mon journal</div>
      <h1 class="journal-titre">Les spectacles<br>de ${pseudo}</h1>
      ${nb?`<p class="journal-sous">${nb} soirée${nb>1?'s':''} mémorisée${nb>1?'s':''}</p>`:''}
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-n">${nb}</div><div class="stat-lbl">Spectacles vus</div></div>
      <div class="stat"><div class="stat-n">${theatres.length}</div><div class="stat-lbl">Théâtres</div></div>
      <div class="stat"><div class="stat-n">${genres.length}</div><div class="stat-lbl">Genres</div></div>
      <div class="stat"><div class="stat-n">${noteMoy}</div><div class="stat-lbl">Note moy.</div></div>
    </div>

    <div class="journal-body">
      ${nb===0?`<div class="vide"><div class="vide-titre">Journal vide</div><p class="vide-desc">Marquez les spectacles que vous avez vus pour les retrouver ici.</p><a href="index.html" class="btn-exp">Explorer</a></div>`
      :Object.entries(groupes).sort((a,b)=>b[0]-a[0]).map(([annee,items])=>`
        <div class="groupe-titre">${annee} · ${items.length} spectacle${items.length>1?'s':''}</div>
        <div class="liste">
          ${items.map(j=>{
            const p=j.pieces,th=p?.representations?.[0]?.theatres,note=avisMap[p?.id];
            const dateVue=j.date_vue?new Date(j.date_vue).toLocaleDateString('fr-FR',{day:'numeric',month:'long'}):null;
            return`<a href="piece.html?id=${p?.id}" class="jcarte">
              <div class="jc-aff">${p?.affiche_url?`<img src="${p.affiche_url}" alt="${p.titre}" loading="lazy">`:'<div class="jc-ph">🎭</div>'}</div>
              <div class="jc-infos">
                <div class="jc-titre">${p?.titre||''}</div>
                ${p?.auteur?`<div class="jc-auteur">${p.auteur}</div>`:''}
                <div class="jc-meta">
                  ${th?`<div class="jc-th"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${th.nom}</div>`:''}
                  ${dateVue?`<div class="jc-date">Vu le ${dateVue}</div>`:''}
                  ${note?`<div class="jc-note">${etoilesHTML(note)}</div>`:''}
                </div>
              </div>
              <button class="jc-btn" onclick="retirer('${j.id}',event)">Retirer</button>
            </a>`;
          }).join('')}
        </div>`).join('')}
    </div>`;
}
window.addEventListener('DOMContentLoaded',charger);
</script>
</body>
</html>
